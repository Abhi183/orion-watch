name: Orion-Watch Pipeline

on:
  schedule:
    - cron: "0 */4 * * *"
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "python/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      source:
        description: "OEM source (auto|arow|horizons)"
        required: false
        default: "auto"

concurrency:
  group: orion-watch-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Fetch → Rust Engine → ML → Viz → Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build Rust binaries
        run: cargo build --release --workspace

      - name: Fetch latest OEM
        run: |
          mkdir -p data
          SOURCE="${{ github.event.inputs.source || 'auto' }}"
          ./target/release/oem-fetch --out data/latest.oem --source "$SOURCE" || \
            cp data/bootstrap.oem data/latest.oem
          wc -l data/latest.oem

      - name: Run Rust OEM Engine
        run: |
          mkdir -p outputs
          ./target/release/oem-engine \
            --input data/latest.oem \
            --features-out data/features.csv \
            --summary-out outputs/summary.json

      - name: Run ML Pipeline
        run: PYTHONPATH=python python python/ml/models.py data/features.csv outputs/summary.json outputs

      - name: Generate Visualisations
        run: PYTHONPATH=python python python/viz/plots.py outputs/features_annotated.csv outputs/ml_results.json

      - name: Copy webapp as index
        run: cp outputs/orion-watch-webapp.html outputs/index.html 2>/dev/null || true

      - name: Write job summary
        run: |
          python - << 'EOF'
          import json, os
          try:
              with open("outputs/ml_results.json") as f:
                  r = json.load(f)
              s = r.get("summary", {})
              a = r.get("models", {}).get("anomaly", {})
              l = r.get("models", {}).get("landing", {})
              md = f"""## Orion-Watch Run\n\n| Metric | Value |\n|---|---|\n| Object | {s.get('object_name','?')} |\n| Duration | {s.get('duration_days',0):.3f} days |\n| Anomalies | {a.get('n_anomalies','?')} ({a.get('anomaly_rate','?')}) |\n| Predicted splashdown | {l.get('lat','?')}N, {l.get('lon','?')}E |\n"""
          except Exception as e:
              md = f"## Orion-Watch Run\n\nError: {e}"
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "w") as f:
              f.write(md)
          EOF

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ data/features.csv || true
          git diff --staged --quiet || git commit -m "auto: Orion update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

  deploy-pages:
    name: Deploy Webapp to GitHub Pages
    needs: pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: git pull origin main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/
      - id: deployment
        uses: actions/deploy-pages@v4

  lint:
    name: Lint (Rust + Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check python/ --ignore E501
