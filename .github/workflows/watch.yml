name: Orion-Watch Pipeline

on:
  schedule:
    # Every 4 hours during Artemis II mission window (Apr 2–11 2026 UTC)
    - cron: "0 */4 * * *"
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "python/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      source:
        description: "OEM source (auto|arow|horizons)"
        required: false
        default: "auto"
      force_rebuild:
        description: "Force Rust rebuild"
        required: false
        type: boolean
        default: false

concurrency:
  group: orion-watch-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Fetch → Rust Engine → ML → Viz → Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # ── Caching ─────────────────────────────────────────────────────────────
      - name: Cache Rust build
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn matplotlib \
            torch --index-url https://download.pytorch.org/whl/cpu

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build Rust binaries (release)
        run: cargo build --release --workspace

      # ── Fetch & Process ───────────────────────────────────────────────────
      - name: Fetch latest OEM
        id: fetch
        run: |
          mkdir -p data
          SOURCE="${{ github.event.inputs.source || 'auto' }}"
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          ./target/release/oem-fetch --out data/latest.oem --source "$SOURCE" || \
            (echo "Fetch failed, using bootstrap" && cp data/bootstrap.oem data/latest.oem)
          wc -l data/latest.oem
          head -20 data/latest.oem

      - name: Run Rust OEM Engine
        run: |
          mkdir -p data outputs
          ./target/release/oem-engine \
            --input data/latest.oem \
            --features-out data/features.csv \
            --summary-out outputs/summary.json | tee outputs/engine_stdout.json

      # ── ML + Viz ──────────────────────────────────────────────────────────
      - name: Run ML Pipeline
        run: |
          python python/ml/models.py data/features.csv data/features_summary.json outputs
        env:
          PYTHONPATH: python

      - name: Generate Visualisations
        run: |
          python python/viz/plots.py \
            outputs/features_annotated.csv \
            outputs/ml_results.json
        env:
          PYTHONPATH: python

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          python - << 'EOF'
          import json, os
          with open("outputs/ml_results.json") as f:
              r = json.load(f)
          s = r.get("summary", {})
          a = r.get("models", {}).get("anomaly", {})
          l = r.get("models", {}).get("landing", {})
          md = f"""## Orion-Watch Run

          | Metric | Value |
          |---|---|
          | Object | {s.get('object_name','?')} |
          | Duration | {s.get('duration_days',0):.3f} days |
          | Max altitude | {s.get('max_alt_km',0):.0f} km |
          | Entry speed | {s.get('entry_speed_kms',0):.3f} km/s |
          | Anomalies | {a.get('n_anomalies','?')} ({a.get('anomaly_rate','?')}) |
          | Predicted splashdown | {l.get('lat','?')}°N, {l.get('lon','?')}°E (±{l.get('sigma_km','?')} km) |
          """
          with open(os.environ["GITHUB_STEP_SUMMARY"], "w") as f:
              f.write(md)
          EOF

      # ── Commit outputs ────────────────────────────────────────────────────
      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ data/latest.oem data/features.csv || true
          git diff --staged --quiet || \
            git commit -m "auto: Orion update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

  # ── Lint job ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (Rust + Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: rustfmt check
        run: cargo fmt --check --all
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install ruff
      - name: ruff lint
        run: ruff check python/
